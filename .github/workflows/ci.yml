name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Serialize runs per ref so two pushes can't deploy into the same dir concurrently.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.7.5"

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno check main.ts

      - name: Test
        run: deno task test

  deploy:
    needs: check
    if: github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - name: Pull latest and restart containers
        run: |
          cd /srv/games/tower-expert
          git fetch origin
          # Stash any local work (recoverable via `git stash list`) so reset --hard
          # can't silently destroy it; -u keeps the gitignored .env untouched.
          git stash push -u -m "pre-deploy $(date -Iseconds)" || true
          # Always deploy main, regardless of which branch the dir was left on.
          git checkout -B main origin/main
          git reset --hard origin/main
          docker compose up --build -d
